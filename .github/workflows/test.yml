name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: cts_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # CI's DATABASE_URL and TEST_DATABASE_URL both point at cts_test —
      # there's no separate "prod" DB in CI, so they can equal each other.
      # The conftest safety check catches the dangerous case (TEST_DATABASE_URL
      # accidentally equal to a real prod DATABASE_URL).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cts_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cts_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Audit dependencies for known vulnerabilities
        # Structural protection against the regression class that produced the
        # 2026-05-04 bcrypt incident (passlib[bcrypt]==1.7.4 silently pulled
        # bcrypt 4.x as an unpinned transitive — see commit ee5c112).
        #
        # Per-CVE whitelist rationale:
        #   CVE-2025-8869 / CVE-2026-1703 / CVE-2026-3219 — pip itself; build tool, not runtime app dep
        #   CVE-2026-24049                                 — wheel; build tool, not runtime app dep
        #   CVE-2024-47874 / CVE-2025-54121                — starlette transitive of fastapi 0.115;
        #                                                    fix requires fastapi major bump (0.115 → 0.136),
        #                                                    tracked separately. Re-evaluate when fastapi bumps.
        run: |
          pip install pip-audit
          pip-audit --strict \
            --ignore-vuln CVE-2025-8869 \
            --ignore-vuln CVE-2026-1703 \
            --ignore-vuln CVE-2026-3219 \
            --ignore-vuln CVE-2026-24049 \
            --ignore-vuln CVE-2024-47874 \
            --ignore-vuln CVE-2025-54121

      - name: Run tests
        run: pytest backend/tests/ -v --tb=short

  lint:
    name: Frontend lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint
