services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cts_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cts_db
      EXERCISE_ROOT: /exercise_data
      SECRET_KEY: change-this-secret-in-production-use-long-random-string
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app/backend
      # Raw exercise source — mounted read-only for ingestion script
      - "C:\\Users\\cruci\\Coding_Projects\\Exercise data\\exercises:/exercise_data:ro"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    volumes:
      # Mount src and public for hot reload; keep node_modules from container
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/.env:/app/.env
    depends_on:
      - backend

volumes:
  postgres_data:
