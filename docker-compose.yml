services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cts_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cts_db
      EXERCISE_ROOT: /exercise_data
      SECRET_KEY: ${SECRET_KEY:-dev-only-secret-not-for-production}
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
      DEBUG: "true"
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app/backend
      # Exercise source data — set EXERCISE_DATA_PATH in .env to your local folder
      - ${EXERCISE_DATA_PATH:-./exercise_data}:/exercise_data:ro
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/.env:/app/.env
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5173/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
